name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting (ruff format)
        run: ruff format --check src/kitty/ tests/

      - name: Lint (ruff check)
        run: ruff check src/kitty/ tests/

      - name: Type check (mypy)
        run: mypy src/kitty/

  # ─────────────────────────────────────────────────────────────────────────
  # Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=kitty \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: python${{ matrix.python-version }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Security
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit + bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit dependencies (pip-audit)
        run: |
          pip freeze --exclude-editable > /tmp/ci-reqs.txt 2>/dev/null || pip freeze | grep -v "^-e" > /tmp/ci-reqs.txt
          pip-audit --strict --desc on -r /tmp/ci-reqs.txt --ignore-vuln PYSEC-2026-2447

      - name: Static analysis (bandit)
        run: bandit -r src/kitty/ -c pyproject.toml
