"""Kubernetes Deployment template for the Kitty API server."""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kitty.fullname" . }}
  labels:
    {{- include "kitty.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.podAnnotations | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kitty.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kitty.selectorLabels" . | nindent 8 }}
        {{- if .Values.observability.metrics.enabled }}
        {{- with .Values.observability.metrics }}
        metrics: "enabled"
        {{- end }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kitty.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - kitty
            - server
            - --host
            - 0.0.0.0
            - --port
            - {{ .Values.service.port | quote }}
          env:
            - name: KITTY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.databaseUrlKey }}
            - name: KITTY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.redisUrlKey }}
            - name: KITTY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.secretKey }}
            - name: KITTY_LOG_LEVEL
              value: {{ .Values.observability.logging.level }}
            - name: KITTY_CACHE_PATH
              value: /cache
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.openai.secretName }}
                  key: {{ .Values.apiKeys.openai.secretKey }}
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.anthropic.secretName }}
                  key: {{ .Values.apiKeys.anthropic.secretKey }}
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              {{- if .Values.observability.tracing.enabled }}
              value: {{ .Values.observability.tracing.endpoint }}
              {{- else }}
              value: ""
              {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            {{- if .Values.observability.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.metrics.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: cache
              mountPath: /cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kitty.fullname" . }}-data
        - name: cache
          persistentVolumeClaim:
            claimName: {{ include "kitty.fullname" . }}-cache
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kitty.fullname" . }}-worker
  labels:
    {{- include "kitty.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  annotations:
    {{- toYaml .Values.podAnnotations | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "kitty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "kitty.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kitty.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - kitty
            - worker
            - --concurrency
            - {{ .Values.worker.concurrency | quote }}
          env:
            - name: KITTY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.databaseUrlKey }}
            - name: KITTY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.redisUrlKey }}
            - name: KITTY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.secretName }}
                  key: {{ .Values.app.secretKey }}
            - name: KITTY_LOG_LEVEL
              value: {{ .Values.observability.logging.level }}
            - name: KITTY_CACHE_PATH
              value: /cache
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.openai.secretName }}
                  key: {{ .Values.apiKeys.openai.secretKey }}
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.anthropic.secretName }}
                  key: {{ .Values.apiKeys.anthropic.secretKey }}
                  optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ include "kitty.fullname" . }}-cache
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
