"""Kubernetes Service template for the Kitty API server."""

apiVersion: v1
kind: Service
metadata:
  name: {{ include "kitty.fullname" . }}
  labels:
    {{- include "kitty.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    {{- if .Values.observability.metrics.enabled }}
    - port: {{ .Values.observability.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "kitty.selectorLabels" . | nindent 4 }}
