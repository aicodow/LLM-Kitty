version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kitty-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: kitty server --host 0.0.0.0 --port 8000
    environment:
      KITTY_DATABASE_URL: ${KITTY_DATABASE_URL:-mysql+aiomysql://kitty:${MYSQL_PASSWORD}@mysql:3306/kitty}
      KITTY_REDIS_URL: ${KITTY_REDIS_URL:-redis://redis:6379/0}
      KITTY_SECRET: ${KITTY_SECRET:?KITTY_SECRET is required}
      KITTY_LOG_LEVEL: ${KITTY_LOG_LEVEL:-info}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - kitty-data:/data
      - kitty-cache:/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kitty-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: kitty worker --concurrency 4
    environment:
      KITTY_DATABASE_URL: ${KITTY_DATABASE_URL:-mysql+aiomysql://kitty:${MYSQL_PASSWORD}@mysql:3306/kitty}
      KITTY_REDIS_URL: ${KITTY_REDIS_URL:-redis://redis:6379/0}
      KITTY_SECRET: ${KITTY_SECRET:?KITTY_SECRET is required}
      KITTY_LOG_LEVEL: ${KITTY_LOG_LEVEL:-info}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - kitty-data:/data
      - kitty-cache:/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - kitty-net
    restart: unless-stopped
    deploy:
      replicas: 2

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kitty
      MYSQL_USER: kitty
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "kitty", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kitty-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kitty-net
    restart: unless-stopped

volumes:
  kitty-data:
  kitty-cache:
  mysql-data:
  redis-data:

networks:
  kitty-net:
    driver: bridge
